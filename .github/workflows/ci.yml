name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: TypeScript build
        run: uv run jlpm build:lib

      - name: Build distributions
        run: uv run python -m build

      - name: Check distributions
        run: uv run twine check dist/*

      - name: Check JupyterLab extension
        run: uv run jupyter labextension list
