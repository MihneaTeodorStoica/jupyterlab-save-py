name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py3.11-uv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py3.11-uv-

      - name: Cache Yarn packages
        uses: actions/cache@v5
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-node20-yarn-${{ hashFiles('yarn.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-yarn-

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: TypeScript build
        run: uv run jlpm build:lib

      - name: Build distributions
        run: uv run python -m build

      - name: Check distributions
        run: uv run twine check dist/*

      - name: Check JupyterLab extension
        run: uv run jupyter labextension list
